<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine Quality Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --wine: #7B1C3E;
      --wine-dark: #2B0A14;
      --wine-light: #C2185B;
      --gold: #D9C47A;
      --gold-soft: #F1E8C7;
      --cream: #FAF6F0;
      --text: #EDE6E3;
      --muted: #A78A8A;
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #4A0E24, #1A040A 70%);
      font-family: 'Jost', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
    }

    /* Floating light orbs (enhanced quality) */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.8;
      pointer-events: none;
      animation: float 10s ease-in-out infinite;
    }

    .orb1 { width: 380px; height: 380px; background: rgba(123,28,62,0.35); top: -120px; right: -80px; }
    .orb2 { width: 260px; height: 260px; background: rgba(201,168,76,0.18); bottom: 0px; left: -120px; animation-delay: 3s; }
    .orb3 { width: 200px; height: 200px; background: rgba(194,24,91,0.18); top: 50%; left: 30%; animation-delay: 6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.08); }
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 820px;
      background: rgba(20, 8, 15, 0.65);
      backdrop-filter: blur(26px) saturate(160%);
      border-radius: 28px;
      padding: 60px 56px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 0 1px rgba(255, 255, 255, 0.4),
        0 20px 60px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeInUp 1s ease forwards;
      opacity: 0;
      transform: translateY(40px);
      position: relative;
      z-index: 1;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .wine-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--wine), var(--gold));
      border-radius: 20px;
      font-size: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 30px rgba(123,28,62,0.5);
      margin: 0 auto 22px;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 44px;
      font-weight: 600;
      color: var(--cream);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .header h1 span {
      color: var(--gold-soft);
    }

    .header p {
      font-size: 15px;
      color: var(--muted);
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
      opacity: 0.8;
    }

    /* Section label */
    .section-label {
      font-size: 12px;
      color: var(--gold-soft);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin: 34px 0 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .section-label::after {
      content: "";
      height: 1px;
      flex: 1;
      background: rgba(255,255,255,0.13);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    label {
      font-size: 12px;
      letter-spacing: 1.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: var(--cream);
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      border-color: var(--gold-soft);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 12px rgba(217,196,122,0.25);
    }

    /* Button */
    .btn-predict {
      margin-top: 42px;
      padding: 18px 60px;
      background: linear-gradient(135deg, var(--wine), var(--wine-light));
      border-radius: 50px;
      color: var(--cream);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 15px;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.35s ease;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 12px 36px rgba(123,28,62,0.4);
    }

    .btn-predict:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, var(--gold-soft), var(--wine-light));
      color: #2B0A14;
      box-shadow: 0 18px 45px rgba(217,196,122,0.5);
    }

    .footer-note {
      margin-top: 22px;
      font-size: 12px;
      opacity: 0.35;
      text-align: center;
    }

    /* Mobile */
    @media (max-width: 650px) {
      .card {
        padding: 36px 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 32px;
      }
    }
  </style>

</head>

<body>

  <!-- Floating elements -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="card">

    <div class="header">
      <div class="wine-icon">🍷</div>
      <h1>Wine Quality <span>Predictor</span></h1>
      <p>Enter the chemical properties to estimate wine quality</p>
      <div class="divider"></div>
    </div>

    <form action="/predict" method="post">

      <!---------------- Acidity ---------------->
      <div class="section-label">Acidity Profile</div>
      <div class="grid">
        <div>
          <label>Fixed Acidity</label>
          <input type="text" name="fixed_acidity" placeholder="7.4" required>
        </div>
        <div>
          <label>Volatile Acidity</label>
          <input type="text" name="volatile_acidity" placeholder="0.70" required>
        </div>
        <div>
          <label>Citric Acid</label>
          <input type="text" name="citric_acid" placeholder="0.00" required>
        </div>
        <div>
          <label>pH Level</label>
          <input type="text" name="pH" placeholder="3.51" required>
        </div>
      </div>

      <!---------------- Chemical ---------------->
      <div class="section-label">Chemical Composition</div>
      <div class="grid">
        <div>
          <label>Residual Sugar</label>
          <input type="text" name="residual_sugar" placeholder="1.9" required>
        </div>
        <div>
          <label>Chlorides</label>
          <input type="text" name="chlorides" placeholder="0.076" required>
        </div>
        <div>
          <label>Sulphates</label>
          <input type="text" name="sulphates" placeholder="0.56" required>
        </div>
        <div>
          <label>Alcohol %</label>
          <input type="text" name="alcohol" placeholder="9.4" required>
        </div>
      </div>

      <!---------------- Sulfur / Density ---------------->
      <div class="section-label">Sulfur Dioxide & Density</div>
      <div class="grid">
        <div>
          <label>Free Sulfur Dioxide</label>
          <input type="text" name="free_sulfur_dioxide" placeholder="11.0" required>
        </div>
        <div>
          <label>Total Sulfur Dioxide</label>
          <input type="text" name="total_sulfur_dioxide" placeholder="34.0" required>
        </div>
        <div>
          <label>Density</label>
          <input type="text" name="density" placeholder="0.9978" required>
        </div>
      </div>

      <!---------------- Submit ---------------->
      <div style="text-align:center;">
        <button class="btn-predict">
          ✦ Predict Quality
        </button>
      </div>

      <div class="footer-note">All 11 features are required for accurate prediction</div>

    </form>

  </div>
</body>
</html>
